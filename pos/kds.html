<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kitchen Status — BKT House</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page kds-page">

  <header id="header">
    <div style="display:flex;align-items:center;gap:10px;">
      <a href="index.html" class="back-link">← <span class="nav-txt">POS</span></a>
      <span id="app-title">👨‍🍳 <span class="app-txt" data-i18n="kitchen_status">Kitchen Status</span></span>
      <span id="kds-count" class="active-count-badge hidden"></span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div id="header-lang"></div>
      <span class="esc-hint">Esc to exit</span>
      <button id="refresh-btn" class="nav-link refresh-btn">↺ <span data-i18n="refresh">Refresh</span></button>
    </div>
  </header>

  <div class="kds-tab-bar">
    <button id="tab-kitchen" class="kds-tab kds-tab--active" data-tab="kitchen">
      🍳 <span data-i18n="in_kitchen">In Kitchen</span> <span id="tab-kitchen-count" class="kds-tab-badge hidden"></span>
    </button>
    <button id="tab-served" class="kds-tab" data-tab="served">
      ✓ <span data-i18n="all_served">All Served</span> <span id="tab-served-count" class="kds-tab-badge hidden"></span>
    </button>
    <span id="last-updated" class="last-updated"></span>
  </div>
  <div id="kds-wrap"></div>

  <script src="i18n.js"></script>
  <script src="menuDefaults.js"></script>
  <script src="kds.js"></script>
  <script>
    (function() {
      const lc = document.getElementById('header-lang');
      if (lc && typeof createLangSwitcher === 'function') {
        lc.appendChild(createLangSwitcher());
        onLangChange(() => translatePage());
      }
      translatePage();
    })();
  </script>
</body>
</html>
