<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>POS — BKT House</title>
  <link rel="stylesheet" href="style.css?v=2026041002">
  <script>
    // Cache-bust: reload CSS & JS if stale
    document.addEventListener('DOMContentLoaded', () => {
      const v = Date.now();
      document.querySelectorAll('link[rel="stylesheet"]').forEach(l => {
        if (l.href.includes('style.css') && !l.href.includes(String(v).slice(0,8))) {
          l.href = l.href.replace(/\?.*/, '') + '?v=' + v;
        }
      });
    });
  </script>
</head>
<body>

  <!-- ── Header ── -->
  <header id="header">
    <span id="app-title">🍲 <span class="app-txt" id="header-shop-name">BKT House</span></span>
    <div id="header-right">
      <button id="user-btn" class="user-chip" title="Logged in user">👤 <span id="user-btn-name">User</span></button>
      <button id="history-btn" class="nav-link" title="Order History">🕐 <span class="nav-txt" data-i18n="history">History</span></button>
      <a href="orders.html" class="nav-link" title="Active Orders">📋 <span class="nav-txt" data-i18n="orders">Orders</span></a>
      <a href="kds.html" class="nav-link" title="Kitchen Status">👨‍🍳 <span class="nav-txt" data-i18n="kitchen_status">Kitchen Status</span></a>
      <a href="report.html" class="nav-link" title="Reports">📊 <span class="nav-txt" data-i18n="reports">Reports</span></a>
      <a href="items.html?tab=maintenance" class="nav-link" title="Maintenance">🔧 <span class="nav-txt" data-i18n="maintenance">Maint.</span></a>
      <button id="pay-bills-btn" class="pay-bills-btn" title="Pay Bills">💰 <span class="nav-txt" data-i18n="pay">Pay</span></button>
    </div>
  </header>

  <!-- ── Split layout ── -->
  <div id="main-layout">

    <!-- Left: Cart panel -->
    <div id="cart-panel">
      <div id="cp-head">
        <div class="cp-head-row">
          <button id="table-select-btn" class="table-select-btn tbl-btn-no-table"><span data-i18n="select_table">Select Table</span> <span class="tbl-arrow">▾</span></button>
          <div class="pax-inline">
            <button class="pax-inline-btn" id="pax-minus">−</button>
            <span class="pax-inline-val" id="pax-display">1</span>
            <button class="pax-inline-btn" id="pax-plus">+</button>
            <span class="pax-inline-label" data-i18n="pax">pax</span>
          </div>
        </div>
        <div id="cp-head-top">
          <div style="display:flex;align-items:center;gap:6px;">
            <span class="cp-title" data-i18n="order">Order</span>
            <span id="cp-item-count" class="cp-item-count"></span>
          </div>
          <button id="cp-clear-btn" class="cp-clear-btn" data-i18n="clear">Clear</button>
        </div>
      </div>

      <div id="cp-body"></div>

      <div id="cp-foot">
        <div class="cp-total-row">
          <span class="cp-total-label" data-i18n="subtotal">Subtotal</span>
          <span id="cp-total">RM 0.00</span>
        </div>
        <button id="send-btn" class="send-btn" disabled data-i18n="send_to_kitchen">Send to Kitchen</button>
      </div>
    </div>

    <!-- Right: Menu panel -->
    <div id="menu-panel">
      <!-- Mobile-only table/pax selector at top of menu -->
      <div id="mobile-table-bar" class="mobile-table-bar">
        <button id="mobile-table-btn" class="table-select-btn tbl-btn-no-table" type="button"><span data-i18n="select_table">Select Table</span> <span class="tbl-arrow">▾</span></button>
        <div class="pax-inline">
          <button class="pax-inline-btn" id="mobile-pax-minus" type="button">−</button>
          <span class="pax-inline-val" id="mobile-pax-display">1</span>
          <button class="pax-inline-btn" id="mobile-pax-plus" type="button">+</button>
          <span class="pax-inline-label" data-i18n="pax">pax</span>
        </div>
        <button id="mobile-pay-btn" class="mobile-pay-btn" type="button" title="Pay">💰</button>
      </div>
      <div id="search-wrap">
        <input type="search" id="search-input" data-i18n-placeholder="search" placeholder="🔍  Search…" autocomplete="off">
      </div>
      <div id="category-bar"></div>
      <div id="menu-area">
        <div id="menu-list"></div>
      </div>
    </div>

  </div><!-- /main-layout -->

  <!-- ── Mobile floating basket bar (visible only on mobile) ── -->
  <button id="mobile-basket-bar" class="mobile-basket-bar hidden" type="button">
    <span class="mobile-basket-left">
      <span class="mobile-basket-count" id="mobile-basket-count">0</span>
    </span>
    <span class="mobile-basket-right" id="mobile-basket-total">RM 0.00</span>
  </button>

  <!-- ── Table picker modal ── -->
  <div id="table-picker-modal" class="overlay hidden" role="dialog" aria-modal="true">
    <div class="sheet table-picker-sheet">
      <div class="sheet-header">
        <div class="sheet-title" data-i18n="select_table">Select Table</div>
        <button class="close-btn" id="table-picker-close" aria-label="Close">✕</button>
      </div>
      <div class="sheet-body" id="table-picker-body"></div>
    </div>
  </div>

  <!-- ── Modifier modal ── -->
  <div id="modifier-modal" class="overlay hidden" role="dialog" aria-modal="true">
    <div class="sheet">
      <div class="sheet-header">
        <div>
          <div id="modal-name-zh" class="sheet-title"></div>
          <div id="modal-name-en" class="sheet-subtitle"></div>
        </div>
        <button class="close-btn" id="modal-close-btn" aria-label="Close">✕</button>
      </div>
      <div class="sheet-body" id="modal-body"></div>
      <div class="sheet-footer">
        <span id="modal-price" class="footer-price"></span>
        <button id="modal-add-btn" class="add-btn" data-i18n="add_to_order">Add to Order</button>
      </div>
    </div>
  </div>

  <!-- ── Billing / Payment modal ── -->
  <div id="payment-modal" class="overlay hidden" role="dialog" aria-modal="true">
    <div class="sheet pay-sheet">
      <div class="sheet-header">
        <div>
          <div id="pay-modal-title" class="sheet-title" data-i18n="unpaid_bills">Unpaid Bills</div>
          <div id="pay-subtitle" class="sheet-subtitle"></div>
        </div>
        <button class="close-btn" id="pay-close-btn" aria-label="Close">✕</button>
      </div>
      <div class="sheet-body" id="pay-body"></div>
      <div class="sheet-footer pay-footer">
        <button id="pay-back-btn" class="secondary-btn hidden" data-i18n="back">← Back</button>
        <button id="pay-confirm-btn" class="send-btn hidden" data-i18n="confirm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- ── History modal ── -->
  <div id="history-modal" class="overlay hidden" role="dialog" aria-modal="true">
    <div class="sheet hist-sheet">
      <div class="sheet-header">
        <div>
          <div class="sheet-title" data-i18n="order_history">Order History</div>
          <div class="sheet-subtitle hist-filter-row">
            <span data-i18n="table">Table</span>: <select id="hist-table-filter"></select>
          </div>
        </div>
        <button class="close-btn" id="hist-close-btn" aria-label="Close">✕</button>
      </div>
      <div class="sheet-body" id="history-body"></div>
    </div>
  </div>

  <!-- ── Login overlay ── -->
  <div id="login-overlay" class="login-overlay hidden">
    <div class="login-box">
      <div id="login-content"></div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div id="toast" class="toast hidden"></div>

  <script src="https://checkout.airwallex.com/assets/elements.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="qrcode.min.js"></script>
  <script src="i18n.js"></script>
  <script src="menuDefaults.js"></script>
  <script src="auth.js"></script>
  <script src="app.js?v=2026041002"></script>
</body>
</html>
